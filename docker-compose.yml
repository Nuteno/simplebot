services:
  bot:
    container_name: simple-vpn-bot
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    init: true
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD-SHELL", "pidof simple_vpn_bot >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
